<div class="container py-5 d-flex justify-content-center">
    <div class="card shadow-lg" style="width: 100%; max-width: 500px; border-radius: 12px;">
        
        <div class="card-header bg-dark text-white text-center py-3">
            <h4 class="mb-0 fw-bold">Texto a Voz (IA)</h4>
        </div>

        <div class="card-body p-4 bg-light">
            
            <div class="mb-3">
                <label class="form-label fw-bold">Escribe el texto a leer:</label>
                <textarea class="form-control" rows="4" [(ngModel)]="textoAEscuchar" placeholder="La IA detecta automáticamente el idioma..."></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Elige una voz (Parametrización):</label>
                <select class="form-select" [(ngModel)]="vozSeleccionada">
                    <option value="alloy">Alloy (Neutra)</option>
                    <option value="echo">Echo (Masculina suave)</option>
                    <option value="fable">Fable (Narrativa)</option>
                    <option value="onyx">Onyx (Masculina profunda)</option>
                    <option value="nova">Nova (Femenina energética)</option>
                    <option value="shimmer">Shimmer (Femenina clara)</option>
                </select>
            </div>

            <button class="btn btn-primary w-100 fw-bold py-2 mb-4" 
                    (click)="generarAudio()" 
                    [disabled]="cargando || !textoAEscuchar">
                {{ cargando ? 'Generando audio...' : '🗣️ Crear Audio' }}
            </button>

            <div *ngIf="audioUrl" class="text-center bg-white p-3 rounded border border-success shadow-sm">
                <p class="text-success fw-bold mb-2">¡Audio listo!</p>
                <audio controls class="w-100" [src]="audioUrl" autoplay></audio>
            </div>

        </div>
    </div>
</div>
