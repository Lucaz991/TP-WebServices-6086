<div class="container py-5 d-flex justify-content-center">
    <div class="card shadow-lg" style="width: 100%; max-width: 350px; background-color: #12436d; color: white; border-radius: 8px;">
        
        <div class="card-header border-0 pt-4 pb-2" style="background-color: #0b3456; border-top-left-radius: 8px; border-top-right-radius: 8px;">
            <h4 class="text-center fw-light mb-0">Conversor De Divisas</h4>
        </div>

        <div class="card-body px-4 py-4">
            
            <div class="mb-3">
                <label class="form-label mb-1 fs-6 text-white-50">Cantidad</label>
                <input type="number" class="form-control" placeholder="Cantidad" [(ngModel)]="cantidad">
            </div>

            <div class="mb-3">
                <label class="form-label mb-1 fs-6 text-white-50">De</label>
                <select class="form-select" [(ngModel)]="monedaOrigen">
                    <option value="USD">USD Dólares EEUU</option>
                    <option value="ARS">ARS Pesos Argentinos</option>
                    <option value="EUR">EUR Euros</option>
                    <option value="BRL">BRL Reales Brasileños</option>
                    <option value="GBP">GBP Libras Esterlinas</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label mb-1 fs-6 text-white-50">A</label>
                <select class="form-select" [(ngModel)]="monedaDestino">
                    <option value="ARS">ARS Pesos Argentinos</option>
                    <option value="USD">USD Dólares EEUU</option>
                    <option value="EUR">EUR Euros</option>
                    <option value="BRL">BRL Reales Brasileños</option>
                    <option value="GBP">GBP Libras Esterlinas</option>
                </select>
            </div>

            <div class="mb-4 mt-4">
                <input type="text" class="form-control fw-bold text-center bg-light text-dark fs-5 py-2" readonly [value]="resultado" placeholder="Resultado">
            </div>

            <button class="btn w-100 fw-bold d-flex justify-content-between align-items-center py-2 px-3 shadow" 
                    style="background-color: #f6aa28; color: #523101; border: none;" 
                    (click)="convertir()">
                <span class="mx-auto text-uppercase tracking-wide">Convertir</span>
                <span class="fs-5">→</span>
            </button>

        </div>
    </div>
</div>
